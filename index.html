<!DOCTYPE html>
<html>
<head>
    <title>Zyvro MIDI Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .btn { padding: 20px; margin: 10px; width: 80%; max-width: 300px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .lg { background: #a50034; color: white; }
        .gov { background: #007bff; color: white; }
        .sb { background: #34c759; color: white; }
    </style>
</head>
<body>
    <h1>Zyvro IR Control</h1>
    <p id="status">Checking for MIDI device...</p>

    <button class="btn lg" onclick="sendNote(60)">LG TV POWER</button>
    <button class="btn gov" onclick="sendNote(62)">GOVEE LIGHTS</button>
    <button class="btn sb" onclick="sendNote(64)">SMARTBOARD POWER</button>

    <script>
        let midiOut = null;

        // Ask Safari for permission to use MIDI
        navigator.requestMIDIAccess().then(access => {
            const outputs = Array.from(access.outputs.values());
            if (outputs.length > 0) {
                midiOut = outputs[0];
                document.getElementById('status').innerText = "Connected: " + midiOut.name;
            } else {
                document.getElementById('status').innerText = "Plug in your RP2040 Zero!";
            }
        });

        function sendNote(note) {
            if (!midiOut) return alert("Device not found!");
            // MIDI 'Note On' message (60 = C4, 62 = D4, etc.)
            midiOut.send([0x90, note, 0x7f]); 
            // Briefly wait then send 'Note Off'
            setTimeout(() => midiOut.send([0x80, note, 0x00]), 100);
        }
    </script>
</body>
</html>
