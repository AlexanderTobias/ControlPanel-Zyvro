<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal IR Remote</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .btn { padding: 15px; margin: 10px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 80%; max-width: 300px; }
        .connect { background: #4CAF50; color: white; }
        .command { background: #2196F3; color: white; }
        #status { margin: 20px; padding: 10px; border: 1px solid #444; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>IR Remote Control</h1>
    <div id="status">Status: Waiting for connection...</div>
    
    <button class="btn connect" onclick="connectSerial()">1. CONNECT TO DEVICE</button>
    
    <div id="controls" style="display:none;">
        <h3>LG TV</h3>
        <button class="btn command" onclick="send('LG_PWR')">Power</button>
        <button class="btn command" onclick="send('LG_VUP')">Vol +</button>
        
        <h3>Govee</h3>
        <button class="btn command" onclick="send('GOV_PWR')">Power</button>
        
        <h3>Smartboard</h3>
        <button class="btn command" onclick="send('SB_PWR')">Power</button>
    </div>

    <script>
        let port;
        let writer;

        async function connectSerial() {
            if (!("serial" in navigator)) {
                alert("Your browser does NOT support Web Serial. Use Chrome on a Laptop/Android.");
                return;
            }

            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                
                const encoder = new TextEncoderStream();
                const outputDone = encoder.readable.pipeTo(port.writable);
                writer = encoder.writable.getWriter();
                
                document.getElementById('status').innerText = "Status: CONNECTED";
                document.getElementById('controls').style.display = "block";
            } catch (err) {
                document.getElementById('status').innerText = "Status: " + err.message;
            }
        }

        async function send(msg) {
            if (writer) {
                await writer.write(msg + "\n");
            }
        }
    </script>
</body>
</html>
